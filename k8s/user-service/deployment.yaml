apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: mental-health-forum
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
      - name: user-service
        image: mental-health-forum/user-service:latest
        imagePullPolicy: Never  # Use locally built image
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: user-service-config
        env:
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: mhf-secrets
              key: postgres-user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mhf-secrets
              key: user-db-password
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: mhf-secrets
              key: jwt-secret
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 30
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
